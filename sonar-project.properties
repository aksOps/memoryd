# SonarQube Cloud analysis configuration.
# Project/organization keys must match the project created at sonarcloud.io;
# adjust them there or here if the SonarCloud project was created with
# different keys.
sonar.projectKey=aksOps_memoryd
sonar.organization=aksops
sonar.projectName=memoryd

sonar.sources=crates
sonar.exclusions=**/target/**
sonar.sourceEncoding=UTF-8

# Coverage: lcov.info is produced in CI by cargo-llvm-cov (see
# .github/workflows/ci.yml, coverage job) before the scanner runs.
sonar.rust.lcov.reportPaths=lcov.info
