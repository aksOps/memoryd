[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "openssl", reason = "memoryd uses rustls/no system OpenSSL in network code" },
    { name = "openssl-sys", reason = "memoryd uses rustls/no system OpenSSL in network code" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
unused-allowed-source = "allow"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "sparse+https://index.crates.io/",
]
