[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
# Targeted exception, not a blanket MPL allow: dyn-eq is a transitive dep of
# tract-core (the in-process embedding runtime). MPL-2.0 is file-level copyleft —
# obligations attach only to modifications of dyn-eq's own files, which we consume
# unmodified from crates.io; it does not affect the memoryd binary's licensing.
#
# webpki-roots is the Mozilla CA certificate *data* bundled by ureq/rustls for
# the openai_compat adapter's TLS. CDLA-Permissive-2.0 is a permissive data
# license with no copyleft obligations; the data is consumed unmodified and
# does not affect the memoryd binary's licensing.
exceptions = [
    { name = "dyn-eq", allow = ["MPL-2.0"] },
    { name = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    { name = "openssl", reason = "memoryd uses rustls/no system OpenSSL in network code" },
    { name = "openssl-sys", reason = "memoryd uses rustls/no system OpenSSL in network code" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
unused-allowed-source = "allow"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "sparse+https://index.crates.io/",
]
